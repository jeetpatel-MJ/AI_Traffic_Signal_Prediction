<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Smart Traffic</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div class="max-w-3xl mx-auto mt-10 bg-white p-8 rounded-lg shadow-lg">
        <h2 class="text-2xl font-bold mb-4">Dashboard</h2>
        <p class="mb-4">Signed in as <strong>{{ session.user }}</strong> ({{ session.role }})</p>
        <div class="flex gap-4">
            <a href="/" class="bg-blue-600 text-white px-4 py-2 rounded">Go to Home</a>
            {% if session.role == 'admin' %}
            <a href="/admin" class="bg-green-600 text-white px-4 py-2 rounded">Admin Panel</a>
            {% endif %}
            <a href="/logout" class="bg-red-500 text-white px-4 py-2 rounded">Logout</a>
        </div>
    </div>
</body>
</html>
