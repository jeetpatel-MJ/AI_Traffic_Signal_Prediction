<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Smart Traffic</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div class="max-w-3xl mx-auto mt-10 bg-white p-8 rounded-lg shadow-lg">
        <h2 class="text-2xl font-bold mb-4">Admin Panel</h2>
        <p class="mb-4">Signed in as <strong>{{ session.user }}</strong></p>
        <form method="POST" action="/admin/retrain">
            <button type="submit" class="bg-yellow-600 text-white px-4 py-2 rounded">Retrain Model</button>
        </form>
        <div class="mt-6">
            <h3 class="font-semibold mb-2">Known Users</h3>
            <ul>
                {% for uname, info in users.items() %}
                    <li>{{ uname }} — Role: {{ info.role or info['role'] }}</li>
                {% endfor %}
            </ul>
        </div>
        <div class="mt-6">
            <a href="/dashboard" class="text-sm text-gray-600">Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
